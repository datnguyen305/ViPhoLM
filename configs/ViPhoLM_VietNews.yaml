vocab:
  type: ViWordVocab
  TRAIN: datasets/VietNews-dataset/train.json
  DEV: datasets/VietNews-dataset/dev.json
  TEST: datasets/VietNews-dataset/test.json
  JSON_PATH: datasets/VietNews-dataset/train.json
  TOKENIZER: null
  
  min_freq: 3
  bos_token: <bos>
  eos_token: <eos>
  unk_token: <unk>
  pad_token: <pad>

dataset:
  train: 
    type: TextSumDatasetPhoneme
    path: datasets/VietNews-dataset/train.json
  dev:
    type: TextSumDatasetPhoneme
    path: datasets/VietNews-dataset/dev.json
  test: 
    type: TextSumDatasetPhoneme
    path: datasets/VietNews-dataset/test.json
  batch_size: 8
  num_workers: 128

model:
  name: ViPhoLM_VietNews
  architecture: ViPhoLM 
  d_model: 512
  n_layers: 3
  head: 8
  hidden_size: 512
  ffn_hidden: 3072
  drop_prob: 0.1
  d_kv: 64
  max_len: 4096
  attention_dilation: [1, 1, 1]
  attention_mode: sliding_chunks_no_overlap
  attention_probs_dropout_prob: 0.2
  attention_window: [256, 256, 256]
  autoregressive: false
  finetuning_task: null
  hidden_act: gelu
  label_smoothing: 0.1
  device: cuda
  inference_length: 100


training:
  checkpoint_path: "checkpoints"
  learning_rate: 0.15
  lr_coverage: 1
  warmup: 2000
  patience: 5
  score: rouge-L

task: TextSumTaskPhoneme # Đảm bảo khớp với tên @META_TASK.register() trong file task