vocab:
  type: Vocab
  path:
    train: datasets/Wikilingual-dataset/train.json
    dev: datasets/Wikilingual-dataset/dev.json
    test: datasets/Wikilingual-dataset/test.json
  min_freq: 3
  bos_token: <bos>
  eos_token: <eos>
  unk_token: <unk>
  pad_token: <pad>

dataset:
  train:
    type: TextSumDataset
    path: datasets/Wikilingual-dataset/train.json
  dev:
    type: TextSumDataset
    path: datasets/Wikilingual-dataset/dev.json
  test:
    type: TextSumDataset
    path: datasets/Wikilingual-dataset/test.json
  batch_size: 32
  num_workers: 16

model:
  name: DualEncodingGRU_Wikilingual
  architecture: DualEncodingGRU_Model
  d_model: 512

  # -------- Primary Encoder (Bi-GRU) --------
  encoder:
    type: PrimaryEncoder
    layer_dim: 1
    input_dim: 512
    hidden_size: 512
    bidirectional: true
    dropout: 0.1

  # -------- Secondary Encoder (Uni-GRU) --------
  secondary_encoder:
    type: SecondaryEncoder
    layer_dim: 1
    input_dim: 512
    hidden_size: 512
    dropout: 0.1

  # -------- Decoder (GRU + Attention) --------
  decoder:
    type: StageDecoder
    layer_dim: 1
    input_dim: 512
    hidden_size: 512
    dropout: 0.1

  # -------- Dual Encoding Params --------
  stage_decode_k: 5          # K in paper
  use_attention: true
  use_secondary_encoder: true
  use_stage_decoding: true

  # -------- Optional Extensions --------
  use_pointer: false
  use_coverage: false

  label_smoothing: 0.1
  device: cuda

training:
  checkpoint_path: "checkpoints"
  learning_rate: 0.15
  warmup: 1000
  patience: 5
  score: rouge-L

task: TextSumTask
